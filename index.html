<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>MashRoyale - Inicio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@600;800&display=swap');
        :root { --gold: #fbc531; --blue: #0097e6; --bg: #1e272e; }
        body { margin: 0; background: #000; font-family: 'Open Sans', sans-serif; color: white; display: flex; justify-content: center; }
        #app-container { width: 100%; max-width: 480px; height: 100vh; display: flex; flex-direction: column; background: var(--bg); }
        header { padding: 15px; text-align: center; background: rgba(0,0,0,0.3); border-bottom: 2px solid #333; }
        header h1 { font-family: 'Bangers'; color: var(--gold); margin: 0; font-size: 38px; }
        #main-content { flex: 1; padding: 20px; overflow-y: auto; text-align: center; }
        .arena-card { background: linear-gradient(145deg, #2c3e50, #000); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 2px solid var(--blue); }
        .btn-battle { background: #e67e22; border: none; border-bottom: 6px solid #d35400; color: white; font-family: 'Bangers'; font-size: 40px; padding: 15px; border-radius: 15px; width: 100%; cursor: pointer; display: block; text-decoration: none; text-align: center; }
        nav { height: 80px; background: #2f3640; display: flex; border-top: 3px solid #111; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: #718093; font-weight: 800; font-size: 14px; }
        .nav-item.active { color: var(--gold); background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>
<div id="app-container">
    <header><h1>MASHROYALE</h1></header>
    <div id="main-content">
        <div class="arena-card">
            <h2 id="arena-name" style="margin:0; font-family:'Bangers'; color:var(--blue); font-size: 30px;">ESTADIO DUENDE</h2>
            <div style="font-size: 28px; font-weight: 800; color:var(--gold); margin-top: 10px;">🏆 <span id="trophies-display">0</span></div>
        </div>
        
        <a href="batalla.html" class="btn-battle" style="margin-top: 50px;">¡BATALLA!</a>
    </div>
    <nav>
        <a href="mazos.html" class="nav-item"><span>🃏</span>MAZOS</a>
        <a href="index.html" class="nav-item active"><span>⚔️</span>INICIO</a>
        <a href="pase.html" class="nav-item"><span>🏆</span>PASE</a>
    </nav>
</div>
<script>
    const ARENAS = ["ESTADIO DUENDE", "FOSO DE HUESOS", "COLISEO BÁRBARO", "ARENA LEGENDARIA"];
    let pData = JSON.parse(localStorage.getItem('mashroyale_data')) || { trophies: 0, arenaIdx: 0, deck: [0,1,2,3] };
    
    document.getElementById('trophies-display').innerText = pData.trophies;
    document.getElementById('arena-name').innerText = ARENAS[pData.arenaIdx];
</script>
</body>
</html>
