<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>MashRoyale - Dashboard Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@600;800&display=swap');
        
        :root {
            --gold: #fbc531; --purple: #9c88ff; --blue: #0097e6;
            --dark: #2f3640; --danger: #e84118; --bg: #1e272e;
        }

        body { margin: 0; background: #000; font-family: 'Open Sans', sans-serif; color: white; overflow: hidden; display: flex; justify-content: center; }
        
        /* CONTENEDOR PRINCIPAL */
        #app-container { 
            width: 100%; max-width: 480px; height: 100vh; 
            position: relative; background: var(--bg); 
            display: flex; flex-direction: column;
        }

        /* CABECERA FIJA */
        header {
            padding: 15px; text-align: center; background: rgba(0,0,0,0.3);
            border-bottom: 2px solid #333;
        }
        header h1 { font-family: 'Bangers'; color: var(--gold); margin: 0; font-size: 38px; text-shadow: 2px 2px #000; }

        /* AREA DE CONTENIDO (SUB-PÁGINAS) */
        #main-content { flex: 1; overflow-y: auto; position: relative; }

        .sub-page { 
            display: none; width: 100%; height: 100%; 
            padding: 20px; box-sizing: border-box; 
        }
        .active-view { display: block; }

        /* PANEL INICIAL (HOME) */
        .arena-card { 
            background: linear-gradient(145deg, #2c3e50, #000); 
            border-radius: 15px; padding: 20px; margin-bottom: 20px;
            border: 2px solid var(--blue); text-align: center;
        }
        .chest-slots { display: flex; justify-content: space-around; gap: 8px; margin: 20px 0; }
        .chest-slot { 
            flex: 1; height: 90px; background: rgba(255,255,255,0.05); border: 2px dashed #555; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 10px;
        }
        .chest-slot.filled { border: 2px solid var(--gold); background: #2f3640; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .btn-battle { 
            background: #e67e22; border: none; border-bottom: 6px solid #d35400; 
            color: white; font-family: 'Bangers'; font-size: 40px; 
            padding: 15px; border-radius: 15px; width: 100%; cursor: pointer; 
        }

        /* MAZOS */
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card { 
            background: #353b48; border-radius: 10px; padding: 8px; text-align: center; 
            position: relative; border: 3px solid transparent; cursor: pointer; 
        }
        .card.locked { opacity: 0.3; filter: grayscale(1); }
        .card.selected { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .card-cost { 
            position: absolute; top: -5px; left: -5px; background: var(--purple); 
            width: 22px; height: 22px; border-radius: 50%; font-size: 12px; 
            display: flex; align-items: center; justify-content: center; border: 1.5px solid white;
        }

        /* NAVEGACIÓN INFERIOR */
        nav { 
            height: 80px; background: #2f3640; display: flex; 
            border-top: 3px solid #111; z-index: 100;
        }
        .nav-item { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; cursor: pointer; color: #718093; font-weight: 800;
        }
        .nav-item.active-nav { color: var(--gold); background: rgba(255,255,255,0.05); }

        /* BATALLA (FULL SCREEN OVERLAY) */
        #canvas { display: none; position: absolute; top: 0; left: 0; z-index: 500; background: #2ecc71; }
        .battle-msg { 
            position: absolute; top: 40%; width: 100%; text-align: center; 
            font-family: 'Bangers'; font-size: 70px; color: var(--gold); 
            text-shadow: 4px 4px #000; display: none; z-index: 1000; pointer-events: none; 
        }
    </style>
</head>
<body>

<div id="app-container">
    <header><h1>MASHROYALE</h1></header>

    <div id="main-content">
        <div id="home-view" class="sub-page active-view">
            <div class="arena-card">
                <h2 id="arena-name" style="margin:0; font-family:'Bangers'; color:var(--blue)">ESTADIO DUENDE</h2>
                <div style="font-size: 22px; font-weight: 800; color:var(--gold)">🏆 <span id="trophies-display">0</span></div>
            </div>

            <div class="chest-slots" id="chest-slots"></div>

            <button class="btn-battle" id="btn-battle" onclick="startBattle()">¡BATALLA!</button>
            <p id="deck-status" style="color:var(--danger); text-align:center; font-size:12px; font-weight:800; margin-top:10px;">SELECCIONA 4 CARTAS EN MAZOS</p>
        </div>

        <div id="deck-view" class="sub-page">
            <h2 style="font-family:'Bangers'; text-align:center;">MI MAZO (<span id="count">0</span>/4)</h2>
            <div class="card-grid" id="inventory"></div>
        </div>

        <div id="pass-view" class="sub-page">
            <h2 style="font-family:'Bangers'; text-align:center;">PASE DE BATALLA</h2>
            <div class="arena-card" style="text-align:left; font-size:14px;">
                <p>⭐ Nivel 1: ✅ 50 Oro</p>
                <p>⭐ Nivel 2: 🔒 100 Oro (400 Copas)</p>
                <p>⭐ Nivel 3: 🔒 Cofre Épico (800 Copas)</p>
                <p>⭐ Nivel 4: 🔒 Nueva Arena (1200 Copas)</p>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item" onclick="switchView('deck', this)"><span>🃏</span>MAZOS</div>
        <div class="nav-item active-nav" onclick="switchView('home', this)"><span>⚔️</span>INICIO</div>
        <div class="nav-item" onclick="switchView('pass', this)"><span>🏆</span>PASE</div>
    </nav>

    <canvas id="canvas" width="480" height="800"></canvas>
    <div id="battle-msg" class="battle-msg">VICTORIA</div>
</div>

<script>
    // --- BASE DE DATOS: 20 CARTAS ---
    const CARDS = [
        { id: 0, name: "CABALLERO", emoji: "⚔️", cost: 3, hp: 1400, dmg: 160, speed: 1.2, range: 45, arena: 1 },
        { id: 1, name: "ARCHERAS", emoji: "🏹", cost: 3, hp: 600, dmg: 90, speed: 1.1, range: 200, arena: 1 },
        { id: 2, name: "GIGANTE", emoji: "🧔", cost: 5, hp: 3500, dmg: 210, speed: 0.8, range: 50, target: "tower", arena: 1 },
        { id: 3, name: "BOMBARDERO", emoji: "💣", cost: 2, hp: 500, dmg: 180, speed: 1.0, range: 170, arena: 1 },
        { id: 4, name: "MOSQUETERA", emoji: "👩‍🚀", cost: 4, hp: 750, dmg: 190, speed: 1.0, range: 210, arena: 2 },
        { id: 5, name: "MINI PEKKA", emoji: "🤖", cost: 4, hp: 1100, dmg: 600, speed: 1.6, range: 45, arena: 2 },
        { id: 6, name: "MONTAPUERCOS", emoji: "🐗", cost: 4, hp: 1500, dmg: 280, speed: 2.2, range: 50, target: "tower", arena: 2 },
        { id: 7, name: "VALQUIRIA", emoji: "🪓", cost: 4, hp: 1400, dmg: 210, speed: 1.1, range: 45, arena: 2 },
        { id: 8, name: "BEBÉ DRAGÓN", emoji: "🐉", cost: 4, hp: 1000, dmg: 100, speed: 1.4, range: 160, arena: 3 },
        { id: 9, name: "PRÍNCIPE", emoji: "🏇", cost: 5, hp: 1700, dmg: 350, speed: 1.8, range: 55, arena: 3 },
        { id: 10, name: "MAGO", emoji: "🔥", cost: 5, hp: 650, dmg: 230, speed: 1.0, range: 190, arena: 3 },
        { id: 11, name: "BÁRBAROS", emoji: "🧔", cost: 5, hp: 700, dmg: 140, speed: 1.0, range: 45, arena: 3 },
        { id: 12, name: "GLOBO", emoji: "🎈", cost: 5, hp: 1300, dmg: 850, speed: 1.0, range: 50, target: "tower", arena: 4 },
        { id: 13, name: "PEKKA", emoji: "🦾", cost: 7, hp: 3500, dmg: 750, speed: 0.8, range: 50, arena: 4 },
        { id: 14, name: "CHISQUITAS", emoji: "⚡", cost: 6, hp: 1100, dmg: 1100, speed: 0.7, range: 180, arena: 4 },
        { id: 15, name: "DRAGÓN INF.", emoji: "🔥", cost: 4, hp: 1000, dmg: 50, speed: 1.3, range: 170, arena: 4 },
        { id: 16, name: "MEGACABALLERO", emoji: "🛡️", cost: 7, hp: 3300, dmg: 230, speed: 1.3, range: 50, arena: 5 },
        { id: 17, name: "MAGO ELÉC.", emoji: "🌩️", cost: 4, hp: 650, dmg: 95, speed: 1.2, range: 190, arena: 5 },
        { id: 18, name: "MINERO", emoji: "⛏️", cost: 3, hp: 1100, dmg: 110, speed: 1.5, range: 45, arena: 5 },
        { id: 19, name: "TRONCO", emoji: "🪵", cost: 2, hp: 1, dmg: 240, isSpell: true, arena: 5 }
    ];

    const ARENAS = [
        { name: "ESTADIO DUENDE", min: 0, color: "#2ecc71" },
        { name: "FOSO DE HUESOS", min: 400, color: "#95a5a6" },
        { name: "COLISEO BÁRBARO", min: 800, color: "#e67e22" },
        { name: "FUERTE DEL PEKKA", min: 1200, color: "#2c3e50" },
        { name: "VALLE ELÉCTRICO", min: 1600, color: "#3498db" }
    ];

    let player = { trophies: 0, deck: [], chests: [null, null, null, null], arenaIdx: 0 };

    // --- NAVEGACIÓN ENTRE SUB-PÁGINAS ---
    function switchView(viewId, el) {
        if (inBattle) return;
        document.querySelectorAll('.sub-page').forEach(v => v.classList.remove('active-view'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        
        document.getElementById(viewId + '-view').classList.add('active-view');
        el.classList.add('active-nav');

        if (viewId === 'deck') renderDeck();
        if (viewId === 'home') updateHomeUI();
    }

    // --- LÓGICA DE MAZOS ---
    function renderDeck() {
        const grid = document.getElementById('inventory');
        grid.innerHTML = CARDS.map(c => {
            const locked = player.arenaIdx + 1 < c.arena;
            const selected = player.deck.includes(c.id);
            return `
                <div class="card ${locked ? 'locked' : ''} ${selected ? 'selected' : ''}" onclick="toggleCard(${c.id}, ${locked})">
                    <div class="card-cost">${c.cost}</div>
                    <div style="font-size:40px; margin:5px 0">${c.emoji}</div>
                    <div style="font-size:9px; font-weight:800">${c.name}</div>
                    ${locked ? `<div style="font-size:14px; position:absolute; top:40%; left:38%">🔒</div>` : ''}
                </div>
            `;
        }).join('');
        document.getElementById('count').innerText = player.deck.length;
    }

    function toggleCard(id, locked) {
        if (locked) return;
        const idx = player.deck.indexOf(id);
        if (idx > -1) player.deck.splice(idx, 1);
        else if (player.deck.length < 4) player.deck.push(id);
        renderDeck();
        updateHomeUI();
    }

    // --- COFRES ---
    function updateChests() {
        const slots = document.getElementById('chest-slots');
        slots.innerHTML = player.chests.map((c, i) => `
            <div class="chest-slot ${c ? 'filled' : ''}" onclick="openChest(${i})">
                ${c ? `<span style="font-size:30px">🎁</span><br><b>${c}</b>` : 'VACÍO'}
            </div>
        `).join('');
    }

    function openChest(i) {
        if (!player.chests[i]) return;
        const reward = Math.floor(Math.random() * 25) + 20;
        alert(`¡COFRE ABIERTO!\nRecompensa: 🏆 ${reward} Copas`);
        player.trophies += reward;
        player.chests[i] = null;
        checkArena();
        updateHomeUI();
    }

    function checkArena() {
        let idx = 0;
        ARENAS.forEach((a, i) => { if(player.trophies >= a.min) idx = i; });
        player.arenaIdx = idx;
    }

    function updateHomeUI() {
        document.getElementById('trophies-display').innerText = player.trophies;
        document.getElementById('arena-name').innerText = ARENAS[player.arenaIdx].name;
        document.getElementById('btn-battle').disabled = player.deck.length < 4;
        document.getElementById('deck-status').style.display = player.deck.length < 4 ? 'block' : 'none';
        updateChests();
    }

    // --- MOTOR DE BATALLA ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let inBattle = false, units = [], towers = [], projectiles = [];
    let elixir = 5, enemyElixir = 5, selectedCard = -1;

    function startBattle() {
        inBattle = true;
        canvas.style.display = 'block';
        units = []; projectiles = []; elixir = 5; enemyElixir = 5;
        towers = [
            { x: 100, y: 150, team: 1, hp: 2400, max: 2400, range: 190 },
            { x: 380, y: 150, team: 1, hp: 2400, max: 2400, range: 190 },
            { x: 240, y: 80, team: 1, hp: 4200, max: 4200, isKing: true, range: 220 },
            { x: 100, y: 600, team: 0, hp: 2400, max: 2400, range: 190 },
            { x: 380, y: 600, team: 0, hp: 2400, max: 2400, range: 190 },
            { x: 240, y: 670, team: 0, hp: 4200, max: 4200, isKing: true, range: 220 }
        ];
        requestAnimationFrame(battleLoop);
    }

    function battleLoop() {
        if (!inBattle) return;
        updateBattle();
        drawBattle();
        requestAnimationFrame(battleLoop);
    }

    function updateBattle() {
        elixir = Math.min(10, elixir + 0.006);
        enemyElixir = Math.min(10, enemyElixir + 0.005);
        
        if (enemyElixir > 7) {
            const possible = CARDS.filter(c => c.arena <= player.arenaIdx + 1);
            const c = possible[Math.floor(Math.random()*possible.length)];
            units.push({...c, x: Math.random()>0.5?100:380, y: 120, team: 1, curHp: c.hp, lastAtk: 0});
            enemyElixir -= c.cost;
        }

        units.forEach(u => {
            const targets = towers.filter(t => t.team !== u.team && t.hp > 0);
            const target = targets.reduce((p, c) => Math.hypot(c.x-u.x, c.y-u.y) < Math.hypot(p.x-u.x, p.y-u.y) ? c : p, targets[0]);
            if (target) {
                const d = Math.hypot(target.x - u.x, target.y - u.y);
                if (d > u.range) {
                    const a = Math.atan2(target.y - u.y, target.x - u.x);
                    u.x += Math.cos(a) * u.speed; u.y += Math.sin(a) * u.speed;
                } else if (Date.now() - (u.lastAtk || 0) > 1000) {
                    target.hp -= u.dmg; u.lastAtk = Date.now();
                }
            }
        });

        towers.forEach(t => {
            if (t.hp <= 0) return;
            const enemy = units.find(u => u.team !== t.team && Math.hypot(u.x-t.x, u.y-t.y) < t.range);
            if (enemy && Date.now() - (t.lastAtk || 0) > 1000) {
                projectiles.push({x: t.x, y: t.y, target: enemy, dmg: 100});
                t.lastAtk = Date.now();
            }
        });

        projectiles.forEach((p, i) => {
            const a = Math.atan2(p.target.y - p.y, p.target.x - p.x);
            p.x += Math.cos(a) * 8; p.y += Math.sin(a) * 8;
            if (Math.hypot(p.target.x - p.x, p.target.y - p.y) < 15) {
                p.target.curHp -= p.dmg; projectiles.splice(i, 1);
            }
        });

        units = units.filter(u => u.curHp > 0);
        if (towers[2].hp <= 0) endBattle("VICTORIA");
        else if (towers[5].hp <= 0) endBattle("DERROTA");
    }

    function drawBattle() {
        ctx.fillStyle = ARENAS[player.arenaIdx].color; ctx.fillRect(0,0,480,800);
        ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(0, 380, 480, 40);
        ctx.fillStyle = "#7e5109"; ctx.fillRect(70, 370, 60, 60); ctx.fillRect(350, 370, 60, 60);

        towers.forEach(t => {
            if (t.hp <= 0) return;
            ctx.fillStyle = t.team === 0 ? "#2980b9" : "#c0392b";
            ctx.fillRect(t.x-25, t.y-25, 50, 50);
            ctx.fillStyle = "#2ecc71"; ctx.fillRect(t.x-25, t.y-35, 50*(t.hp/t.max), 6);
        });

        units.forEach(u => { ctx.font = "32px Arial"; ctx.fillText(u.emoji, u.x-16, u.y+12); });
        projectiles.forEach(p => { ctx.fillStyle="black"; ctx.beginPath(); ctx.arc(p.x,p.y,5,0,Math.PI*2); ctx.fill(); });

        ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, 680, 480, 120);
        player.deck.forEach((id, i) => {
            const c = CARDS.find(x => x.id === id);
            ctx.fillStyle = selectedCard === i ? var(--gold) : "#34495e";
            ctx.fillRect(20 + i*115, 690, 95, 100);
            ctx.fillStyle="white"; ctx.font="30px Arial"; ctx.fillText(c.emoji, 50+i*115, 750);
            ctx.font="14px Bangers"; ctx.fillText(c.cost, 30+i*115, 710);
        });
        ctx.fillStyle = var(--purple); ctx.fillRect(20, 785, (elixir/10)*440, 10);
    }

    function endBattle(res) {
        inBattle = false;
        const msg = document.getElementById('battle-msg');
        msg.innerText = res; msg.style.display = 'block';
        if (res === "VICTORIA") {
            player.trophies += 30;
            const slot = player.chests.indexOf(null);
            if (slot > -1) player.chests[slot] = "COFRE ORO";
            checkArena();
        }
        setTimeout(() => {
            msg.style.display = 'none';
            canvas.style.display = 'none';
            updateHomeUI();
        }, 3000);
    }

    canvas.addEventListener('mousedown', e => {
        const r = canvas.getBoundingClientRect();
        const x = (e.clientX - r.left) * (480/r.width), y = (e.clientY - r.top) * (800/r.height);
        if (y > 680) selectedCard = Math.floor((x-20)/115);
        else if (selectedCard !== -1 && y > 400) {
            const c = CARDS.find(v => v.id === player.deck[selectedCard]);
            if (elixir >= c.cost) {
                elixir -= c.cost;
                units.push({...c, x, y, team: 0, curHp: c.hp, lastAtk: 0});
                selectedCard = -1;
            }
        }
    });

    // Inicio
    updateHomeUI();
</script>
</body>
</html>
