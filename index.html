<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>MashRoyale - Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@600;800&display=swap');
        
        :root {
            --gold: #fbc531; --purple: #9c88ff; --blue: #0097e6;
            --dark: #2f3640; --danger: #e84118; --bg: #1e272e;
        }

        body { margin: 0; background: #000; font-family: 'Open Sans', sans-serif; color: white; overflow: hidden; display: flex; justify-content: center; }
        #app-container { width: 100%; max-width: 480px; height: 100vh; position: relative; background: var(--bg); border: 2px solid #333; }

        /* NAVEGACIÓN */
        .page { display: none; width: 100%; height: calc(100% - 80px); position: absolute; top: 0; overflow-y: auto; padding: 20px; box-sizing: border-box; z-index: 10; }
        .active-page { display: block; }

        /* INICIO */
        #home-page { text-align: center; }
        .arena-card { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)); border-radius: 15px; padding: 20px; margin: 15px 0; border: 2px solid var(--gold); }
        .chest-slots { display: flex; justify-content: space-around; gap: 8px; margin: 20px 0; }
        .chest-slot { 
            flex: 1; height: 100px; background: rgba(0,0,0,0.5); border: 2px dashed #666; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 11px;
        }
        .chest-slot.filled { border: 2.5px solid var(--blue); background: #2f3640; box-shadow: 0 4px 10px rgba(0,0,0,0.5); animation: shake 3s infinite; }
        @keyframes shake { 0%, 90% { transform: rotate(0); } 92% { transform: rotate(5deg); } 95% { transform: rotate(-5deg); } 100% { transform: rotate(0); } }

        .btn-battle { background: #e67e22; border: none; border-bottom: 6px solid #d35400; color: white; font-family: 'Bangers'; font-size: 42px; padding: 12px; border-radius: 15px; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-battle:active { transform: translateY(3px); border-bottom-width: 2px; }

        /* MAZO */
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding-bottom: 20px; }
        .card { background: #353b48; border-radius: 10px; padding: 10px; text-align: center; position: relative; border: 3px solid transparent; cursor: pointer; transition: 0.1s; }
        .card.locked { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }
        .card.selected { border-color: var(--gold); background: #4b6584; }
        .card-cost { position: absolute; top: -5px; left: -5px; background: var(--purple); width: 24px; height: 24px; border-radius: 50%; font-size: 14px; font-weight: 800; display: flex; align-items: center; justify-content: center; z-index: 5; border: 2px solid white; }
        .lock-icon { font-size: 20px; position: absolute; top: 35%; left: 40%; color: white; }

        /* NAVBAR */
        #nav { position: absolute; bottom: 0; width: 100%; height: 80px; background: #2f3640; display: flex; z-index: 100; border-top: 3px solid #111; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: #718093; font-weight: 800; transition: 0.3s; }
        .nav-item.active-nav { color: var(--gold); background: rgba(255,255,255,0.05); }

        /* BATALLA */
        #canvas { display: none; background: #2ecc71; touch-action: none; z-index: 5; }
        .battle-msg { position: absolute; top: 40%; width: 100%; text-align: center; font-family: 'Bangers'; font-size: 70px; color: var(--gold); text-shadow: 4px 4px #000; display: none; z-index: 1000; pointer-events: none; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="battle-msg" class="battle-msg">VICTORIA</div>

    <div id="deck-page" class="page">
        <h2 style="text-align:center; font-family:'Bangers'; font-size:35px">MI MAZO (<span id="count">0</span>/4)</h2>
        <div class="card-grid" id="inventory"></div>
    </div>

    <div id="home-page" class="page active-page">
        <h1 style="font-size: 50px; color: var(--gold); text-shadow: 4px 4px #000; margin: 10px 0; font-family:'Bangers'">MASHROYALE</h1>
        
        <div class="arena-card">
            <h2 id="arena-name" style="margin:0; font-family:'Bangers'; color:var(--blue)">ESTADIO DUENDE</h2>
            <div style="font-size: 20px; font-weight: 800; margin-top:5px">🏆 <span id="trophies-display">0</span></div>
        </div>

        <div class="chest-slots" id="chest-slots"></div>

        <button class="btn-battle" id="btn-battle" onclick="startBattle()">¡BATALLA!</button>
        <p id="deck-status" style="color: var(--danger); font-size: 13px; font-weight: 800; margin-top: 10px;">SELECCIONA 4 CARTAS</p>
    </div>

    <div id="pass-page" class="page">
        <h2 style="text-align:center; font-family:'Bangers'; font-size:35px">PASE REAL</h2>
        <div class="arena-card" style="text-align:left">
            <p>Nivel 1: ✅ 100 Oro</p>
            <p>Nivel 2: 🔒 Cofre Gigante (400 Copas)</p>
            <p>Nivel 3: 🔒 Reacción Exclusiva (800 Copas)</p>
        </div>
    </div>

    <canvas id="canvas" width="480" height="800"></canvas>

    <div id="nav">
        <div class="nav-item" onclick="showTab('deck', this)"><span>🃏</span>MAZO</div>
        <div class="nav-item active-nav" onclick="showTab('home', this)"><span>⚔️</span>INICIO</div>
        <div class="nav-item" onclick="showTab('pass', this)"><span>🏆</span>PASE</div>
    </div>
</div>

<script>
    // --- 20 CARTAS TOTALES ---
    const CARDS = [
        { id: 0, name: "CABALLERO", emoji: "⚔️", cost: 3, hp: 1450, dmg: 160, speed: 1.2, range: 45, arena: 1 },
        { id: 1, name: "ARCHERAS", emoji: "🏹", cost: 3, hp: 600, dmg: 95, speed: 1.1, range: 210, arena: 1 },
        { id: 2, name: "GIGANTE", emoji: "🧔", cost: 5, hp: 3600, dmg: 210, speed: 0.8, range: 50, target: "tower", arena: 1 },
        { id: 3, name: "BOMBARDERO", emoji: "💣", cost: 2, hp: 500, dmg: 200, speed: 1.0, range: 180, arena: 1 },
        { id: 4, name: "FLECHAS", emoji: "🏹", cost: 3, hp: 1, dmg: 300, isSpell: true, arena: 1 },
        { id: 5, name: "MINI PEKKA", emoji: "🤖", cost: 4, hp: 1200, dmg: 680, speed: 1.6, range: 45, arena: 2 },
        { id: 6, name: "MONTAPUERCOS", emoji: "🐗", cost: 4, hp: 1600, dmg: 320, speed: 2.3, range: 50, target: "tower", arena: 2 },
        { id: 7, name: "BEBÉ DRAGÓN", emoji: "🐉", cost: 4, hp: 1100, dmg: 100, speed: 1.4, range: 160, arena: 2 },
        { id: 8, name: "VALQUIRIA", emoji: "🪓", cost: 4, hp: 1500, dmg: 220, speed: 1.1, range: 45, arena: 2 },
        { id: 9, name: "MOSQUETERA", emoji: "👩‍🚀", cost: 4, hp: 800, dmg: 200, speed: 1.0, range: 220, arena: 3 },
        { id: 10, name: "PRÍNCIPE", emoji: "🏇", cost: 5, hp: 1800, dmg: 350, speed: 1.8, range: 55, arena: 3 },
        { id: 11, name: "MAGO", emoji: "🔥", cost: 5, hp: 700, dmg: 240, speed: 1.0, range: 200, arena: 3 },
        { id: 12, name: "BÁRBAROS", emoji: "🧔", cost: 5, hp: 800, dmg: 150, speed: 1.0, range: 45, arena: 3 },
        { id: 13, name: "GLOBO", emoji: "🎈", cost: 5, hp: 1400, dmg: 900, speed: 1.0, range: 50, target: "tower", arena: 4 },
        { id: 14, name: "PEKKA", emoji: "🦾", cost: 7, hp: 3800, dmg: 800, speed: 0.8, range: 50, arena: 4 },
        { id: 15, name: "CHISQUITAS", emoji: "⚡", cost: 6, hp: 1200, dmg: 1200, speed: 0.7, range: 190, arena: 4 },
        { id: 16, name: "MAGO ELÉCTRICO", emoji: "🌩️", cost: 4, hp: 700, dmg: 100, speed: 1.2, range: 200, arena: 5 },
        { id: 17, name: "MEGACABALLERO", emoji: "🛡️", cost: 7, hp: 3500, dmg: 250, speed: 1.3, range: 50, arena: 5 },
        { id: 18, name: "MINERO", emoji: "⛏️", cost: 3, hp: 1200, dmg: 120, speed: 1.5, range: 45, arena: 5 },
        { id: 19, name: "TRONCO", emoji: "🪵", cost: 2, hp: 1, dmg: 250, isSpell: true, arena: 5 }
    ];

    const ARENAS = [
        { name: "ESTADIO DUENDE", min: 0, color: "#2ecc71" },
        { name: "FOSO DE HUESOS", min: 400, color: "#95a5a6" },
        { name: "COLISEO BÁRBARO", min: 800, color: "#e67e22" },
        { name: "FUERTE DEL PEKKA", min: 1200, color: "#2c3e50" },
        { name: "VALLE ELÉCTRICO", min: 1600, color: "#3498db" }
    ];

    let player = { trophies: 0, deck: [], chests: [null, null, null, null], arenaIdx: 0 };

    // --- COFRES ---
    function updateChests() {
        const slots = document.getElementById('chest-slots');
        slots.innerHTML = player.chests.map((c, i) => `
            <div class="chest-slot ${c ? 'filled' : ''}" onclick="openChest(${i})">
                ${c ? `<span style="font-size:35px">🎁</span><br><b>${c}</b>` : 'VACÍO'}
            </div>
        `).join('');
    }

    function openChest(i) {
        if (!player.chests[i]) return;
        const reward = Math.floor(Math.random() * 20) + 15;
        alert(`¡COFRE ABIERTO!\nObtenido: 🏆 ${reward} Copas`);
        player.trophies += reward;
        player.chests[i] = null;
        checkArena();
        updateHomeUI();
    }

    // --- PROGRESO ---
    function checkArena() {
        let newIdx = 0;
        for(let i=0; i<ARENAS.length; i++) {
            if(player.trophies >= ARENAS[i].min) newIdx = i;
        }
        player.arenaIdx = newIdx;
    }

    // --- NAVEGACIÓN ---
    function showTab(id, el) {
        if (inBattle) return;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById(id + '-page').classList.add('active-page');
        el.classList.add('active-nav');
        if (id === 'deck') renderDeck();
        if (id === 'home') updateHomeUI();
    }

    function renderDeck() {
        const grid = document.getElementById('inventory');
        grid.innerHTML = CARDS.map(c => {
            const locked = player.arenaIdx + 1 < c.arena;
            const selected = player.deck.includes(c.id);
            return `
                <div class="card ${locked ? 'locked' : ''} ${selected ? 'selected' : ''}" onclick="toggleCard(${c.id}, ${locked})">
                    <div class="card-cost">${c.cost}</div>
                    <div style="font-size:45px; margin:5px 0">${c.emoji}</div>
                    <div style="font-size:10px; font-weight:800">${c.name}</div>
                    ${locked ? `<div class="lock-icon">🔒</div>` : ''}
                </div>
            `;
        }).join('');
        document.getElementById('count').innerText = player.deck.length;
    }

    function toggleCard(id, locked) {
        if (locked) return;
        const idx = player.deck.indexOf(id);
        if (idx > -1) player.deck.splice(idx, 1);
        else if (player.deck.length < 4) player.deck.push(id);
        renderDeck();
        updateHomeUI();
    }

    function updateHomeUI() {
        document.getElementById('trophies-display').innerText = player.trophies;
        document.getElementById('arena-name').innerText = ARENAS[player.arenaIdx].name;
        document.getElementById('btn-battle').disabled = player.deck.length < 4;
        document.getElementById('deck-status').style.display = player.deck.length < 4 ? 'block' : 'none';
        updateChests();
    }

    // --- MOTOR DE BATALLA ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let inBattle = false, units = [], towers = [], projectiles = [];
    let elixir = 5, enemyElixir = 5, selectedCard = -1;

    function startBattle() {
        inBattle = true;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById('nav').style.display = 'none';
        canvas.style.display = 'block';
        
        units = []; projectiles = []; elixir = 5; enemyElixir = 5;
        towers = [
            { x: 100, y: 150, team: 1, hp: 2500, max: 2500, range: 190 },
            { x: 380, y: 150, team: 1, hp: 2500, max: 2500, range: 190 },
            { x: 240, y: 80, team: 1, hp: 4500, max: 4500, isKing: true, range: 220 },
            { x: 100, y: 600, team: 0, hp: 2500, max: 2500, range: 190 },
            { x: 380, y: 600, team: 0, hp: 2500, max: 2500, range: 190 },
            { x: 240, y: 670, team: 0, hp: 4500, max: 4500, isKing: true, range: 220 }
        ];
        requestAnimationFrame(battleLoop);
    }

    function battleLoop() {
        if (!inBattle) return;
        elixir = Math.min(10, elixir + 0.006);
        enemyElixir = Math.min(10, enemyElixir + 0.005);
        
        // IA Enemiga (Usa cartas aleatorias del pool desbloqueado)
        if (enemyElixir > 7) {
            const possible = CARDS.filter(c => c.arena <= player.arenaIdx + 1);
            const c = possible[Math.floor(Math.random()*possible.length)];
            units.push({...c, x: Math.random()>0.5?100:380, y: 120, team: 1, curHp: c.hp, lastAtk: 0});
            enemyElixir -= c.cost;
        }

        // Lógica de movimiento y ataque
        units.forEach(u => {
            const targets = towers.filter(t => t.team !== u.team && t.hp > 0);
            const target = targets.reduce((prev, curr) => 
                Math.hypot(curr.x-u.x, curr.y-u.y) < Math.hypot(prev.x-u.x, prev.y-u.y) ? curr : prev, targets[0]);

            if (target) {
                const dist = Math.hypot(target.x - u.x, target.y - u.y);
                if (dist > u.range) {
                    const angle = Math.atan2(target.y - u.y, target.x - u.x);
                    u.x += Math.cos(angle) * u.speed;
                    u.y += Math.sin(angle) * u.speed;
                } else if (Date.now() - (u.lastAtk || 0) > 1000) {
                    target.hp -= u.dmg;
                    u.lastAtk = Date.now();
                }
            }
        });

        // Torres disparan
        towers.forEach(t => {
            if (t.hp <= 0) return;
            const enemy = units.find(u => u.team !== t.team && Math.hypot(u.x-t.x, u.y-t.y) < t.range);
            if (enemy && Date.now() - (t.lastAtk || 0) > 1000) {
                projectiles.push({x: t.x, y: t.y, target: enemy, dmg: 110});
                t.lastAtk = Date.now();
            }
        });

        // Proyectiles
        projectiles.forEach((p, i) => {
            const angle = Math.atan2(p.target.y - p.y, p.target.x - p.x);
            p.x += Math.cos(angle) * 8; p.y += Math.sin(angle) * 8;
            if (Math.hypot(p.target.x - p.x, p.target.y - p.y) < 15) {
                p.target.curHp -= p.dmg;
                projectiles.splice(i, 1);
            }
        });

        units = units.filter(u => u.curHp > 0);
        
        // Dibujado
        ctx.fillStyle = ARENAS[player.arenaIdx].color; ctx.fillRect(0,0,480,800);
        ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(0, 380, 480, 40); // Rio
        ctx.fillStyle = "#7e5109"; ctx.fillRect(70, 370, 60, 60); ctx.fillRect(350, 370, 60, 60); // Puentes

        towers.forEach(t => {
            if (t.hp <= 0) return;
            ctx.fillStyle = t.team === 0 ? "#2980b9" : "#c0392b";
            ctx.fillRect(t.x-25, t.y-25, 50, 50);
            ctx.fillStyle = "#2ecc71"; ctx.fillRect(t.x-25, t.y-35, 50*(t.hp/t.max), 6);
        });

        units.forEach(u => {
            ctx.font = "32px Arial"; ctx.fillText(u.emoji, u.x-16, u.y+12);
        });

        projectiles.forEach(p => { ctx.fillStyle="black"; ctx.beginPath(); ctx.arc(p.x,p.y,5,0,Math.PI*2); ctx.fill(); });

        // Mano e Interfaz
        ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, 680, 480, 120);
        player.deck.forEach((id, i) => {
            const c = CARDS.find(x => x.id === id);
            ctx.fillStyle = selectedCard === i ? var(--gold) : "#34495e";
            ctx.fillRect(20 + i*115, 690, 95, 100);
            ctx.fillStyle="white"; ctx.font="30px Arial"; ctx.fillText(c.emoji, 50+i*115, 750);
            ctx.font="16px Bangers"; ctx.fillText(c.cost, 30+i*115, 710);
        });
        ctx.fillStyle = var(--purple); ctx.fillRect(20, 785, (elixir/10)*440, 10);

        if (towers[2].hp <= 0) endBattle("VICTORIA");
        else if (towers[5].hp <= 0) endBattle("DERROTA");
        else requestAnimationFrame(battleLoop);
    }

    function endBattle(res) {
        inBattle = false;
        const msg = document.getElementById('battle-msg');
        msg.innerText = res; msg.style.display = 'block';
        if (res === "VICTORIA") {
            player.trophies += 30;
            const empty = player.chests.indexOf(null);
            if (empty > -1) player.chests[empty] = "COFRE ORO";
            checkArena();
        } else {
            player.trophies = Math.max(0, player.trophies - 15);
        }
        setTimeout(() => {
            msg.style.display = 'none';
            canvas.style.display = 'none';
            document.getElementById('nav').style.display = 'flex';
            showTab('home', document.querySelectorAll('.nav-item')[1]);
        }, 3000);
    }

    canvas.addEventListener('mousedown', e => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (480/rect.width);
        const y = (e.clientY - rect.top) * (800/rect.height);
        if (y > 680) selectedCard = Math.floor((x-20)/115);
        else if (selectedCard !== -1 && y > 400) {
            const c = CARDS.find(v => v.id === player.deck[selectedCard]);
            if (elixir >= c.cost) {
                elixir -= c.cost;
                units.push({...c, x, y, team: 0, curHp: c.hp, lastAtk: 0});
                selectedCard = -1;
            }
        }
    });

    updateHomeUI();
</script>
</body>
</html>
