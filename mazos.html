<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mazos - MashRoyale</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@600;800&display=swap');
        :root { --gold: #fbc531; --purple: #9c88ff; --bg: #1e272e; }
        body { margin: 0; background: #000; font-family: 'Open Sans', sans-serif; color: white; display: flex; justify-content: center; }
        #app-container { width: 100%; max-width: 480px; height: 100vh; display: flex; flex-direction: column; background: var(--bg); }
        header { padding: 15px; text-align: center; background: rgba(0,0,0,0.3); border-bottom: 2px solid #333; }
        header h1 { font-family: 'Bangers'; color: var(--gold); margin: 0; font-size: 38px; }
        #main-content { flex: 1; padding: 20px; overflow-y: auto; }
        
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding-bottom: 20px;}
        .card { background: #353b48; border-radius: 10px; padding: 10px; text-align: center; position: relative; border: 3px solid transparent; cursor: pointer; transition: 0.2s;}
        .card.selected { border-color: var(--gold); box-shadow: 0 0 15px rgba(251, 197, 49, 0.5); background: #2f3640;}
        .card.locked { opacity: 0.4; filter: grayscale(100%); cursor: not-allowed; }
        .card-cost { position: absolute; top: -5px; left: -5px; background: var(--purple); width: 22px; height: 22px; border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center; border: 1.5px solid white; }
        .lock-icon { position: absolute; top: 35%; left: 40%; font-size: 24px; text-shadow: 0 0 5px black;}
        
        nav { height: 80px; background: #2f3640; display: flex; border-top: 3px solid #111; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: #718093; font-weight: 800; font-size: 14px; }
        .nav-item.active { color: var(--gold); background: rgba(255,255,255,0.05); }
        .arena-title { font-family: 'Bangers'; color: #00a8ff; text-align: center; margin-top: 20px; font-size: 22px; border-bottom: 2px dashed #444; padding-bottom: 5px;}
    </style>
</head>
<body>
<div id="app-container">
    <header><h1>MASHROYALE</h1></header>
    <div id="main-content">
        <h2 style="font-family:'Bangers'; text-align:center;">MI MAZO (<span id="count">0</span>/4)</h2>
        <p style="text-align:center; font-size:12px; color:#aaa; margin-top:-10px;">Selecciona 4 cartas para luchar</p>
        <div id="inventory"></div>
    </div>
    <nav>
        <a href="mazos.html" class="nav-item active"><span>🃏</span>MAZOS</a>
        <a href="index.html" class="nav-item"><span>⚔️</span>INICIO</a>
        <a href="pase.html" class="nav-item"><span>🏆</span>PASE</a>
    </nav>
</div>
<script>
    // Las mismas 30 cartas
    const CARDS = [
        { id: 0, arena: 1, name: "DUENDES", cost: 2, emoji: "👺" }, { id: 1, arena: 1, name: "CABALLERO", cost: 3, emoji: "🤺" }, { id: 2, arena: 1, name: "ARQUERAS", cost: 3, emoji: "🏹" }, { id: 3, arena: 1, name: "GIGANTE", cost: 5, emoji: "🧔" }, { id: 4, arena: 1, name: "BOLA FUEGO", cost: 4, emoji: "🔥" }, { id: 5, arena: 1, name: "MOSQUETERA", cost: 4, emoji: "👩‍🚀" },
        { id: 6, arena: 2, name: "ESQUELETOS", cost: 1, emoji: "💀" }, { id: 7, arena: 2, name: "VALQUIRIA", cost: 4, emoji: "🪓" }, { id: 8, arena: 2, name: "BOMBARDERO", cost: 2, emoji: "💣" }, { id: 9, arena: 2, name: "MINI P.E.K.K.A", cost: 4, emoji: "🤖" }, { id: 10, arena: 2, name: "LÁPIDA", cost: 3, emoji: "🪦" }, { id: 11, arena: 2, name: "BEBÉ DRAGÓN", cost: 4, emoji: "🐲" },
        { id: 12, arena: 3, name: "BÁRBAROS", cost: 5, emoji: "👱" }, { id: 13, arena: 3, name: "CAÑÓN", cost: 3, emoji: "🧱" }, { id: 14, arena: 3, name: "FLECHAS", cost: 3, emoji: "🏹" }, { id: 15, arena: 3, name: "ARIETE", cost: 4, emoji: "🪵" }, { id: 16, arena: 3, name: "GOLEM", cost: 8, emoji: "🪨" }, { id: 17, arena: 3, name: "BARRIL", cost: 3, emoji: "🛢️" },
        { id: 18, arena: 4, name: "P.E.K.K.A", cost: 7, emoji: "🦾" }, { id: 19, arena: 4, name: "MONTAPUERCOS", cost: 4, emoji: "🐗" }, { id: 20, arena: 4, name: "MAGO", cost: 5, emoji: "🧙" }, { id: 21, arena: 4, name: "SABUESO", cost: 7, emoji: "🌋" }, { id: 22, arena: 4, name: "DESCARGA", cost: 2, emoji: "⚡" }, { id: 23, arena: 4, name: "TORRE INF.", cost: 5, emoji: "🗼" },
        { id: 24, arena: 5, name: "MURCIÉLAGOS", cost: 2, emoji: "🦇" }, { id: 25, arena: 5, name: "MAGO HIELO", cost: 3, emoji: "❄️" }, { id: 26, arena: 5, name: "GLOBO", cost: 5, emoji: "🎈" }, { id: 27, arena: 5, name: "VENENO", cost: 4, emoji: "🧪" }, { id: 28, arena: 5, name: "PRÍNCIPE", cost: 5, emoji: "🏇" }, { id: 29, arena: 5, name: "CHISPITAS", cost: 6, emoji: "🔋" }
    ];

    let pData = JSON.parse(localStorage.getItem('mashroyale_data')) || { trophies: 0, arenaIdx: 0, deck: [1,2,3,4] };

    function renderDeck() {
        const container = document.getElementById('inventory');
        container.innerHTML = '';
        
        // Agrupar por arenas
        for(let i = 1; i <= 5; i++) {
            const arenaCards = CARDS.filter(c => c.arena === i);
            const isArenaUnlocked = pData.arenaIdx + 1 >= i;
            
            container.innerHTML += `<div class="arena-title">ARENA ${i} ${isArenaUnlocked ? '' : '🔒'}</div>`;
            
            let gridHtml = '<div class="card-grid">';
            arenaCards.forEach(c => {
                const isSelected = pData.deck.includes(c.id);
                const isLocked = !isArenaUnlocked;
                
                gridHtml += `
                    <div class="card ${isSelected ? 'selected' : ''} ${isLocked ? 'locked' : ''}" onclick="toggleCard(${c.id}, ${isLocked})">
                        <div class="card-cost">${c.cost}</div>
                        <div style="font-size:45px; margin:5px 0">${c.emoji}</div>
                        <div style="font-size:11px; font-weight:800">${c.name}</div>
                        ${isLocked ? '<div class="lock-icon">🔒</div>' : ''}
                    </div>
                `;
            });
            gridHtml += '</div>';
            container.innerHTML += gridHtml;
        }
        
        document.getElementById('count').innerText = pData.deck.length;
    }

    function toggleCard(id, isLocked) {
        if(isLocked) { alert("¡Aún no tienes copas para desbloquear esta Arena!"); return; }
        
        const idx = pData.deck.indexOf(id);
        if (idx > -1) {
            pData.deck.splice(idx, 1);
        } else if (pData.deck.length < 4) {
            pData.deck.push(id);
        } else {
            alert("Tu mazo ya está lleno (4/4). Quita una carta primero.");
        }
        localStorage.setItem('mashroyale_data', JSON.stringify(pData));
        renderDeck();
    }

    renderDeck();
</script>
</body>
</html>
